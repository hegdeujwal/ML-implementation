# =============================================================================
# fluent_bit.conf — Live syslog ingestion for HPE CX / Aruba switches
# =============================================================================
#
# Purpose
# -------
# Receives live syslog streams from CX switches over UDP/TCP 514 and forwards
# them to a local file in data/raw/ for downstream batch processing.
#
# Status (as of Phase 2)
# ----------------------
# This configuration is NOT yet tested against live CX hardware.
# The INPUT section is configured for the expected CX syslog format.
# The OUTPUT section writes to a local file — swap to an ES or Postgres
# output plugin once the live integration is tested end-to-end.
#
# Setup steps before using
# ------------------------
# 1. Install Fluent Bit: https://docs.fluentbit.io/manual/installation
# 2. Ensure UDP 514 is open in your firewall / security group.
# 3. Point your CX switch syslog target at this host on port 514:
#      switch# logging host <this-host-ip> severity informational
# 4. Run: fluent-bit -c ingestion/fluent_bit.conf
# 5. Verify data/raw/cx_switches.log is receiving lines.
#
# Switching to batch mode
# -----------------------
# If you have historical dump files rather than a live stream, use
# ingestion/batch_loader.py instead of this configuration.
# =============================================================================

[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  /etc/fluent-bit/parsers.conf

# ---------------------------------------------------------------------------
# INPUT — Syslog listener (UDP 514, RFC 3164 / RFC 5424)
# ---------------------------------------------------------------------------
[INPUT]
    Name          syslog
    Mode          udp
    Listen        0.0.0.0
    Port          514
    Parser        syslog-rfc3164
    Tag           cx_switches

# ---------------------------------------------------------------------------
# FILTER — Enrich with ingestion metadata
# ---------------------------------------------------------------------------
[FILTER]
    Name          record_modifier
    Match         cx_switches
    Record        source_type cx_syslog
    Record        pipeline_stage raw_ingestion

# ---------------------------------------------------------------------------
# OUTPUT — Write to rotating local file for batch processing
# ---------------------------------------------------------------------------
[OUTPUT]
    Name          file
    Match         cx_switches
    Path          data/raw
    File          cx_switches.log
    Format        plain

# ---------------------------------------------------------------------------
# OUTPUT (alternative) — Forward to Elasticsearch for live dashboards
# Uncomment and configure once ES is verified reachable.
# ---------------------------------------------------------------------------
# [OUTPUT]
#     Name          es
#     Match         cx_switches
#     Host          localhost
#     Port          9200
#     Index         cx_logs
#     Type          _doc
#     Logstash_Format On
#     Logstash_Prefix cx_logs
#     Retry_Limit   5
